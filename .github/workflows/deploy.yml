name: deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-package-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven Clean Verify
        run: mvn clean verify

      - name: Maven Package
        run: mvn package

      - name: Verify Lambda artifact
        run: test -f target/function.zip

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          SES_TO_EMAIL: ${{ secrets.SES_TO_EMAIL }}
        run: |
          PARAMS=()
          [ -n "$SES_FROM_EMAIL" ] && PARAMS+=("SesFromEmail=$SES_FROM_EMAIL")
          [ -n "$SES_TO_EMAIL" ] && PARAMS+=("SesToEmail=$SES_TO_EMAIL")
          CMD=(sam deploy
            --template-file template.yaml
            --stack-name fiap-techchallenge-4
            --region "${{ secrets.AWS_REGION }}"
            --capabilities CAPABILITY_IAM
            --resolve-s3
          )
          [ ${#PARAMS[@]} -gt 0 ] && CMD+=(--parameter-overrides "${PARAMS[@]}")
          CMD+=(--no-confirm-changeset --no-fail-on-empty-changeset)
          "${CMD[@]}"